<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veverčí věštírna</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>Veverčí věštírna</h1>
      <div class="squirrel-frame">
        <div class="squirrel-illustration">
          <img src="veverka.jpeg" alt="Veverka v pařezu držící oříšek" />
        </div>
        <div class="speech-bubble" aria-live="polite">
          <p id="bubbleText">Veverka ti šeptá svou věštbu...</p>
        </div>
      </div>
      <p class="subtitle">Klikni na lískový oříšek a veverka ti vyřkne věštbu v bublině.</p>
      <div id="fortuneButton" class="acorn-button" role="button" tabindex="0" aria-label="Klikni pro věštbu">
        <img src="nut-transparent.png" alt="Průhledný lískový oříšek" class="fortune-button-image" />
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
